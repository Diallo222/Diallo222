name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Diallo222
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=ec0484&color_dots=ebedf0,9be9a8,40c463,30a14e,216e39
            dist/github-snake-green-dark.svg?color_snake=a3e635&color_dots=21262d,0e4429,006d32,39d353,7ee787

      - name: Prepare snake assets for GitHub README
        run: |
          python3 << 'PY'
          from pathlib import Path
          path = Path("dist/github-snake-green-dark.svg")
          text = path.read_text()
          repl = {
              "var(--cs)": "#a3e635",
              "var(--ce)": "#21262d",
              "var(--c0)": "#21262d",
              "var(--c1)": "#0e4429",
              "var(--c2)": "#006d32",
              "var(--c3)": "#39d353",
              "var(--c4)": "#7ee787",
              "var(--cb)": "#1b1f230a",
          }
          for old, new in repl.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          rsvg-convert -w 880 -o dist/github-snake-green-dark.png dist/github-snake-green-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
