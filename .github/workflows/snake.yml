name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Diallo222
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=ec0484&color_dots=ebedf0,9be9a8,40c463,30a14e,216e39
            dist/github-snake-dark.svg?palette=github-dark&color_snake=00bcd4&color_dots=161b22,0e4429,006d32,26a641,39d353

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
