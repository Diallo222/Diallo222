<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Almahady Diallo  Creative Developer">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec0484"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d7d7d7"/>
      <stop offset="55%" stop-color="#d7d7d7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d7d7d7" stop-opacity="0"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #0c0c0c; }
      .eyebrow {
        font-family: 'Space Mono', ui-monospace, monospace;
        font-size: 13px;
        fill: #9c9c9c;
        letter-spacing: 0.42em;
      }
      .title {
        font-family: 'Bebas Neue', Impact, sans-serif;
        font-size: 108px;
        fill: #d7d7d7;
        letter-spacing: 0.18em;
      }
      .sub {
        font-family: 'Space Mono', ui-monospace, monospace;
        font-size: 14px;
        fill: #6f6f6f;
        letter-spacing: 0.38em;
      }
      .tag {
        font-family: 'Space Mono', ui-monospace, monospace;
        font-size: 11px;
        fill: #00bcd4;
        letter-spacing: 0.28em;
      }
    </style>
  </defs>

  <rect class="bg" width="1200" height="320"/>

  <!-- top rule -->
  <rect x="80" y="52" width="520" height="1" fill="url(#rule)"/>

  <text x="600" y="78" text-anchor="middle" class="eyebrow">D I G I T A L . D E V</text>

  <text x="600" y="188" text-anchor="middle" class="title">D I A L L O</text>

  <!-- accent bar -->
  <rect x="340" y="206" width="520" height="3" fill="url(#accent)"/>

  <text x="600" y="248" text-anchor="middle" class="sub">F U L L - S T A C K . C R E A T O R</text>

  <text x="600" y="286" text-anchor="middle" class="tag">A L M A H A D Y &nbsp; D I A L L O</text>
</svg>
